services:
  backend:
    build:
      context: ./backend
    environment:
      PILOTGPT_DATA_DIR: /app/data
      CORS_ORIGINS: http://192.168.1.79:3000
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
